<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Wall Clock Control</title>
    <link rel="stylesheet" href="/assets/app.css">
  </head>
  <body class="control-page">
    <main class="phone-shell">
      <header class="phone-header">
        <div>
          <h1 id="talkTitle">Ready</h1>
          <p id="meetingType" class="meeting-type">Midweek meeting</p>
        </div>
        <div class="header-links">
          <a class="icon-link" href="/pair">Pair</a>
          <a class="icon-link" href="/setup" aria-label="Open setup">Setup</a>
        </div>
      </header>

      <section id="tokenWarning" class="notice hidden">
        Pair this phone from <strong>/pair</strong> before controlling the timer.
      </section>

      <section class="compact-timer">
        <p id="partPosition" class="card-eyebrow">Schedule</p>
        <div id="timeValue" class="control-time">00:00</div>
        <select id="talkSelect" class="talk-select-input" aria-label="Jump to part"></select>
        <p id="nextPart" class="card-next"></p>
      </section>

      <section class="button-grid primary-controls">
        <button id="startBtn" class="action action-primary" type="button">Start</button>
        <button id="pauseBtn" class="action" type="button">Pause</button>
        <button id="resetBtn" class="action action-danger" type="button">Reset</button>
        <button id="bellBtn" class="action" type="button">Bell</button>
      </section>

      <section class="button-grid">
        <button data-adjust="-60" class="action" type="button">-1 min</button>
        <button data-adjust="-30" class="action" type="button">-30 sec</button>
        <button data-adjust="30" class="action" type="button">+30 sec</button>
        <button data-adjust="60" class="action" type="button">+1 min</button>
      </section>

      <section class="button-grid">
        <button id="prevBtn" class="action" type="button">&#9664;&#xFE0E; Previous part</button>
        <button id="nextBtn" class="action" type="button">Next part &#9654;&#xFE0E;</button>
      </section>
    </main>
    <script src="/assets/shared.js"></script>
    <script src="/assets/control.js"></script>
  </body>
</html>
