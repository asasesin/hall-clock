<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Pair Wall Clock</title>
    <link rel="stylesheet" href="/assets/app.css">
  </head>
  <body class="pair-page">
    <main class="pair-shell">
      <section class="pair-card">
        <p class="eyebrow">Controller pairing</p>
        <h1>Scan to control this wall clock</h1>
        <section id="pairError" class="notice hidden">
          Could not load the controller link. Check that the wall clock server is running.
        </section>
        <img id="qrImage" class="qr hidden" alt="QR code for the phone controller">
        <p class="pair-url" id="pairUrl">Loading controller link...</p>
        <div class="pair-actions">
          <a id="controlLink" class="action action-primary" href="/control">Open controller</a>
          <a id="returnControlLink" class="action" href="/control">Return to controller</a>
        </div>
      </section>
    </main>
    <script>
      fetch("/api/pairing")
        .then((response) => {
          if (!response.ok) throw new Error("pairing unavailable");
          return response.json();
        })
        .then((pairing) => {
          document.getElementById("qrImage").src = "/qr.png?t=" + Date.now();
          document.getElementById("qrImage").classList.remove("hidden");
          document.getElementById("pairUrl").textContent = pairing.controlUrl;
          document.getElementById("controlLink").href = pairing.controlUrl;
        })
        .catch(() => {
          document.getElementById("pairError").classList.remove("hidden");
          document.getElementById("pairUrl").textContent = "Controller link unavailable.";
          document.getElementById("controlLink").classList.add("hidden");
        });
    </script>
  </body>
</html>
